<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Uma carta pra você</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     ✦ CONSTANTES DE PERSONALIZAÇÃO (edite aqui) ✦
     Os valores definidos abaixo em :root e no <script>
     controlam cores, textos, memórias, imagens e áudios.
     ========================================================= */
  :root {
    --bg-color: #f3e7d9;            /* cor do fundo inicial */
    --bg-color-2: #e9d4bd;          /* leve gradiente do fundo */
    --envelope-color: #d9a98b;      /* cor do envelope */
    --envelope-shadow: #b07e62;     /* sombra do envelope */
    --paper-color: #fdf6ec;         /* cor do papel da carta */
    --paper-edge: #ead9bf;          /* borda do papel */
    --ink-color: #5b3a29;           /* cor do texto da carta */
    --accent: #c46a6a;              /* coraçãozinho / detalhe */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: 'Cormorant Garamond', serif;
    background: radial-gradient(circle at 50% 30%, var(--bg-color) 0%, var(--bg-color-2) 100%);
    color: var(--ink-color);
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  /* Partículas suaves de fundo (corações/pétalas) */
  .floaties { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .floaty {
    position: absolute; bottom: -20px;
    font-size: 14px; opacity: 0;
    animation: floatUp linear infinite;
    color: var(--accent);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.7; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* ========== TELA INICIAL / ENVELOPE ========== */
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; z-index: 2;
    transition: opacity .8s ease;
  }
  .hint {
    font-family: 'Caveat', cursive;
    font-size: 20px; color: var(--ink-color);
    opacity: .75; letter-spacing: .5px;
    animation: breathe 3s ease-in-out infinite;
    text-align: center; padding: 0 24px;
  }
  @keyframes breathe { 0%,100% { opacity:.55; transform: translateY(0); } 50% { opacity:.95; transform: translateY(-3px); } }

  .envelope-wrap {
    position: relative;
    width: min(78vw, 320px);
    aspect-ratio: 3 / 2;
    cursor: pointer;
    animation: hover 4s ease-in-out infinite;
    transition: transform .6s cubic-bezier(.2,.8,.2,1), opacity .6s ease;
  }
  @keyframes hover { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-8px);} }

  .envelope {
    position: absolute; inset: 0;
    background: var(--envelope-color);
    border-radius: 6px;
    box-shadow:
      0 14px 30px -10px rgba(80,40,20,.35),
      inset 0 -2px 0 rgba(0,0,0,.06);
    overflow: hidden;
  }
  /* Aba superior triangular (fechada) */
  .flap {
    position: absolute; top: 0; left: 0; right: 0;
    height: 100%;
    background: var(--envelope-color);
    clip-path: polygon(0 0, 100% 0, 50% 62%);
    transform-origin: top center;
    transition: transform 1s cubic-bezier(.6,.05,.3,1);
    z-index: 3;
    filter: brightness(1.04);
  }
  .flap::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(0,0,0,.08));
    clip-path: inherit;
  }
  /* Bolso frontal */
  .pocket {
    position: absolute; inset: 0;
    background: var(--envelope-color);
    clip-path: polygon(0 100%, 100% 100%, 100% 30%, 50% 64%, 0 30%);
    z-index: 4;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.08);
  }

  /* Papel saindo do envelope */
  .letter-preview {
    position: absolute;
    left: 8%; right: 8%;
    top: 18%;
    height: 70%;
    background: var(--paper-color);
    border: 1px solid var(--paper-edge);
    border-radius: 3px;
    z-index: 3;
    transform: translateY(0);
    transition: transform 1s cubic-bezier(.6,.05,.3,1) .2s;
    box-shadow: 0 4px 10px rgba(0,0,0,.08);
  }

  /* Estado aberto */
  .opened .flap { transform: rotateX(180deg); }
  .opened .letter-preview { transform: translateY(-58%); }
  .opened .envelope-wrap { transform: scale(.9); opacity: 0; transition-delay: .9s; }
  .opened .hint { opacity: 0; }

  /* ========== CARTA EM TELA CHEIA ========== */
  .letter-screen {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 20%, var(--bg-color) 0%, var(--bg-color-2) 100%);
    overflow-y: auto;
    overflow-x: hidden;
    z-index: 5;
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease .9s;
    -webkit-overflow-scrolling: touch;
  }
  .letter-screen.show { opacity: 1; pointer-events: auto; }

  .paper {
    margin: 28px 18px 60px;
    background: var(--paper-color);
    border: 1px solid var(--paper-edge);
    border-radius: 6px;
    padding: 32px 24px 36px;
    box-shadow:
      0 20px 40px -12px rgba(80,40,20,.25),
      0 2px 0 rgba(255,255,255,.6) inset;
    background-image:
      repeating-linear-gradient(180deg, transparent 0 31px, rgba(180,120,80,.07) 31px 32px);
    position: relative;
    transform: translateY(20px) scale(.98);
    opacity: 0;
    transition: opacity 1s ease 1.1s, transform 1s ease 1.1s;
  }
  .letter-screen.show .paper { opacity: 1; transform: translateY(0) scale(1); }

  .paper::before, .paper::after {
    content:''; position: absolute; left: 50%;
    width: 60px; height: 18px;
    background: rgba(200,160,120,.25);
    transform: translateX(-50%) rotate(-3deg);
    border-radius: 2px;
  }
  .paper::before { top: -8px; }
  .paper::after  { display: none; }

  .salutation {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    color: var(--ink-color);
    margin-bottom: 14px;
  }
  .body-text {
    font-size: 18px; line-height: 1.7;
    white-space: pre-line;
  }
  .signature {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    text-align: right;
    margin-top: 22px;
    color: var(--ink-color);
  }
  .heart {
    display:inline-block; color: var(--accent);
    animation: beat 1.6s ease-in-out infinite;
  }
  @keyframes beat { 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.18);} }

  /* ====== Divisor delicado entre carta e memórias ====== */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 22px 6px;
    color: var(--ink-color); opacity: .65;
    font-family: 'Caveat', cursive; font-size: 20px;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, transparent, rgba(91,58,41,.35), transparent);
  }

  /* ====== MEMÓRIAS (polaroids / recortes) ====== */
  .memories {
    padding: 6px 18px 80px;
    display: flex; flex-direction: column;
    gap: 22px;
  }
  .memory {
    background: var(--paper-color);
    border: 1px solid var(--paper-edge);
    border-radius: 4px;
    padding: 12px 12px 16px;
    box-shadow: 0 12px 24px -10px rgba(80,40,20,.25);
    transform: rotate(var(--rot, -1.2deg));
    opacity: 0; translate: 0 16px;
    transition: opacity .8s ease, translate .8s ease;
  }
  .memory.in { opacity: 1; translate: 0 0; }
  .memory:nth-child(even) { --rot: 1.5deg; align-self: flex-end; max-width: 86%; }
  .memory:nth-child(odd)  { --rot: -1.5deg; align-self: flex-start; max-width: 86%; }

  .memory .photo {
    width: 100%; aspect-ratio: 4 / 5;
    background: #d8c5ad center/cover no-repeat;
    border-radius: 2px;
    filter: saturate(.95) contrast(1.02);
  }
  .memory .date {
    font-family: 'Caveat', cursive;
    font-size: 18px; margin-top: 10px;
    color: var(--ink-color); opacity: .8;
  }
  .memory .caption {
    font-size: 16px; line-height: 1.5; margin-top: 4px;
    font-style: italic;
  }

  /* Memória variante "trecho escrito" (sem foto) */
  .memory.note { padding: 18px 16px; background: var(--paper-color); }
  .memory.note .quote {
    font-family: 'Caveat', cursive;
    font-size: 22px; line-height: 1.4;
  }

  /* Rodapé carinhoso */
  .footer {
    text-align: center; padding: 0 24px 40px;
    font-family: 'Caveat', cursive; font-size: 20px;
    color: var(--ink-color); opacity: .7;
  }

  /* Botão de som discreto */
  .sound-toggle {
    position: fixed; top: 14px; right: 14px;
    z-index: 10;
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(91,58,41,.15);
    color: var(--ink-color);
    border-radius: 999px;
    width: 38px; height: 38px;
    display: none; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }
  .sound-toggle.visible { display: flex; }
</style>
</head>
<body>

<div class="floaties" id="floaties"></div>

<button class="sound-toggle" id="soundToggle" aria-label="Ativar/desativar som">♪</button>

<!-- TELA 1: envelope -->
<div class="stage" id="stage">
  <div class="hint">toque no envelope</div>
  <div class="envelope-wrap" id="envelopeWrap" role="button" aria-label="Abrir carta">
    <div class="envelope">
      <div class="letter-preview"></div>
      <div class="pocket"></div>
      <div class="flap"></div>
    </div>
  </div>
  <div class="hint" style="font-size:16px;opacity:.5;">feito com carinho</div>
</div>

<!-- TELA 2: carta + memórias -->
<div class="letter-screen" id="letterScreen">
  <div class="paper">
    <div class="salutation" id="salutation"></div>
    <div class="body-text" id="bodyText"></div>
    <div class="signature" id="signature"></div>
  </div>

  <div class="divider"><span>nossas memórias</span></div>

  <div class="memories" id="memories"></div>

  <div class="footer" id="footer"></div>
</div>

<!-- Áudios (carregados, mas só tocam após interação) -->
<audio id="sfx" preload="auto"></audio>
<audio id="music" preload="auto" loop></audio>

<script>
  /* =========================================================
     ✦ CONTEÚDO PERSONALIZÁVEL ✦
     Edite os campos abaixo para personalizar a carta.
     ========================================================= */
  const CONTENT = {
    salutation: "Para você, minha moreninha,",
    body:
`Tem coisas que eu não consigo dizer olhando nos seus olhos sem ficar sem palavras — então resolvi escrever.

Obrigado por cada manhã preguiçosa, por cada risada boba, por cada vez que você segura a minha mão como se o mundo coubesse ali. Você é o meu lugar favorito.

Eu queria que essa carta nunca acabasse, do mesmo jeito que eu queria que o tempo com você nunca acabasse. Mas, como tudo o que é bonito, ela precisa caber em algumas linhas.

Então fica com isto: eu te amo. Hoje, amanhã, e em todos os pequenos dias entre eles.`,
    signature: "— seu, sempre",
    footerNote: "De Erik para Ellen ♡",

    // ✦ Memórias (use type: "photo" ou "note")
    memories: [
      { type: "photo", date: "nossa primeira foto juntos",  caption: "eu estava tão feliz por ter ver pessoalmente...", image: "" },
      { type: "note",  quote: "“foi você quem me ensinou que casa também pode ser uma pessoa.”" },
      { type: "photo", date: "nosso lugar",        caption: "aquele milkshake gostoso que você ama.", image: "" },
      { type: "photo", date: "uma viagem nossa",   caption: "rindo do nada, do tudo, de você.",         image: "" },
      { type: "note",  quote: "“te amar é a coisa mais fácil que eu já fiz.”" }
    ],

    // ✦ Arquivos de áudio (coloque os arquivos em /public ou use URL)
    sfxOpen: "",   // ex: "/abrir-carta.mp3"
    music:   ""    // ex: "/musica.mp3"
  };

  /* ===== Render ===== */
  document.getElementById('salutation').textContent = CONTENT.salutation;
  document.getElementById('bodyText').textContent   = CONTENT.body;
  document.getElementById('signature').innerHTML    = CONTENT.signature + ' <span class="heart">♥</span>';
  document.getElementById('footer').textContent     = CONTENT.footerNote;

  const memWrap = document.getElementById('memories');
  CONTENT.memories.forEach(m => {
    const el = document.createElement('div');
    el.className = 'memory' + (m.type === 'note' ? ' note' : '');
    if (m.type === 'photo') {
      el.innerHTML = `
        <div class="photo" style="${m.image ? `background-image:url('${m.image}')` : ''}"></div>
        <div class="date">${m.date || ''}</div>
        <div class="caption">${m.caption || ''}</div>`;
    } else {
      el.innerHTML = `<div class="quote">${m.quote || ''}</div>`;
    }
    memWrap.appendChild(el);
  });

  /* ===== Áudio ===== */
  const sfx   = document.getElementById('sfx');
  const music = document.getElementById('music');
  if (CONTENT.sfxOpen) sfx.src   = CONTENT.sfxOpen;
  if (CONTENT.music)   music.src = CONTENT.music;

  const soundToggle = document.getElementById('soundToggle');
  soundToggle.addEventListener('click', () => {
    if (music.paused) { music.play().catch(()=>{}); soundToggle.textContent = '♪'; }
    else              { music.pause();              soundToggle.textContent = '♬'; }
  });

  /* ===== Abertura ===== */
  const stage    = document.getElementById('stage');
  const wrap     = document.getElementById('envelopeWrap');
  const letterEl = document.getElementById('letterScreen');
  let opened = false;

  function openLetter() {
    if (opened) return;
    opened = true;

    // Áudio só após interação (mobile-safe)
    if (sfx.src)   { try { sfx.currentTime = 0; sfx.play().catch(()=>{}); } catch(e){} }
    if (music.src) { music.volume = 0; music.play().then(() => fadeIn(music, .55, 1800)).catch(()=>{}); soundToggle.classList.add('visible'); }

    wrap.classList.add('opened');
    stage.classList.add('opened');

    setTimeout(() => {
      letterEl.classList.add('show');
      stage.style.opacity = '0';
      setTimeout(() => stage.style.display = 'none', 900);
      revealMemoriesOnScroll();
    }, 900);
  }

  wrap.addEventListener('click', openLetter);
  wrap.addEventListener('touchend', e => { e.preventDefault(); openLetter(); }, { passive: false });

  function fadeIn(audio, target, ms) {
    const steps = 30, stepMs = ms / steps;
    let i = 0;
    const id = setInterval(() => {
      i++; audio.volume = Math.min(target, (target * i) / steps);
      if (i >= steps) clearInterval(id);
    }, stepMs);
  }

  /* ===== Reveal das memórias ao rolar ===== */
  function revealMemoriesOnScroll() {
    const items = document.querySelectorAll('.memory');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: .15 });
    items.forEach(el => io.observe(el));
  }

  /* ===== Partículas (corações) ===== */
  (function makeFloaties(){
    const wrap = document.getElementById('floaties');
    const symbols = ['♥','✿','❀','♡'];
    for (let i=0; i<14; i++) {
      const s = document.createElement('span');
      s.className = 'floaty';
      s.textContent = symbols[i % symbols.length];
      s.style.left = (Math.random()*100) + '%';
      s.style.fontSize = (10 + Math.random()*14) + 'px';
      s.style.animationDuration = (12 + Math.random()*14) + 's';
      s.style.animationDelay = (Math.random()*14) + 's';
      s.style.opacity = .6;
      wrap.appendChild(s);
    }
  })();
</script>
</body>
</html>
